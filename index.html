<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>拾帖 - Kiritecho</title>
  <script>
    ;(() => {
      const supportedThemePreferences = ['light', 'dark', 'system']
      const systemThemeQuery = window.matchMedia?.('(prefers-color-scheme: dark)')
      let themePreference = 'system'

      try {
        const storedThemePreference = localStorage.getItem('kiritecho.theme')
        if (supportedThemePreferences.includes(storedThemePreference)) {
          themePreference = storedThemePreference
        }
      } catch {}

      const themeMode = themePreference === 'system'
        ? (systemThemeQuery?.matches ? 'dark' : 'light')
        : themePreference

      document.documentElement.setAttribute('theme-preference', themePreference)
      document.documentElement.setAttribute('theme-mode', themeMode)
      document.documentElement.classList.toggle('dark', themeMode === 'dark')
      document.documentElement.style.colorScheme = themeMode
    })()
  </script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #app { width: 100%; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Helvetica Neue', Helvetica, Arial, sans-serif;
      background: #ffffff;
      overflow: hidden;
    }
    html[theme-mode="light"] body { background: #ffffff; }
    html[theme-mode="dark"] body { background: #0d0f0e; }

    @media (prefers-color-scheme: dark) {
      body { background: #0d0f0e; }
    }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
